name: Daily briefing

on:
  schedule:
    - cron: "15 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate daily briefing
        run: python scripts/generate_daily_briefing.py

      - name: Commit updated briefing
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily-briefing.json
          git diff --cached --quiet || git commit -m "chore: update daily briefing"
          git push
