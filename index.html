<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Captures FRED — 10 ans</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a1120;
        --card: #131f35;
        --text: #e9f1ff;
        --sub: #9fb4d9;
        --border: #263a60;
      }

      * {
        box-sizing: border-box;
        font-family: Inter, Segoe UI, Roboto, sans-serif;
      }

      body {
        margin: 0;
        background: radial-gradient(circle at top, #0f1f3b 0%, var(--bg) 60%);
        color: var(--text);
      }

      .container {
        width: min(1500px, 96vw);
        margin: 1.2rem auto 2rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.5rem, 1.1rem + 1.8vw, 2.5rem);
      }

      .subtitle,
      .updated {
        color: var(--sub);
        margin-top: 0.6rem;
      }

      .updated {
        color: #89e6be;
      }

      .grid {
        margin-top: 1rem;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
        gap: 1rem;
      }

      .card {
        background: color-mix(in srgb, var(--card) 92%, black 8%);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 0.8rem;
      }

      .card h2 {
        margin: 0;
        font-size: 1.02rem;
      }

      .meta {
        margin: 0.35rem 0 0.65rem;
        font-size: 0.82rem;
        color: var(--sub);
      }

      .current-value {
        margin: 0 0 0.6rem;
        font-size: 0.95rem;
        color: #ffd67a;
      }

      .chart-img {
        width: 100%;
        height: clamp(320px, 42vh, 520px);
        border: 1px solid #1f3152;
        border-radius: 8px;
        background: #0b1324;
        object-fit: contain;
        object-position: center;
        cursor: zoom-in;
      }

      .lightbox {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background: rgba(0, 0, 0, 0.78);
        z-index: 999;
      }

      .lightbox.open {
        display: flex;
      }

      .lightbox img {
        max-width: min(1400px, 95vw);
        max-height: 90vh;
        border-radius: 10px;
        border: 1px solid #3a5488;
        background: #0b1324;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      }

      .error {
        color: #ff9a9a;
      }

      a {
        color: #89b9ff;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>États-Unis — captures FRED sur 10 ans</h1>
      <p class="subtitle">
        Série d'images (captures de graphiques FRED St. Louis) sur une fenêtre glissante de 10 ans.
      </p>
      <p id="updated" class="updated">Préparation des captures...</p>
      <section id="grid" class="grid"></section>
    </main>

    <div id="lightbox" class="lightbox" aria-hidden="true">
      <img id="lightboxImage" alt="Aperçu agrandi du graphique" />
    </div>

    <script>
      const SERIES = [
        { title: "PIB réel", id: "GDPC1" },
        { title: "CPI / IPC", id: "CPIAUCSL" },
        { title: "Core inflation", id: "CPILFESL" },
        { title: "Taux de chômage", id: "UNRATE" },
        { title: "Création d’emplois", id: "PAYEMS" },
        { title: "Croissance des salaires", id: "CES0500000003" },
        { title: "Taux directeur", id: "FEDFUNDS" },
        { title: "10 ans gouvernemental", id: "GS10" },
        { title: "Spread 10 ans – 2 ans", id: "T10Y2Y" },
        { title: "Ventes au détail / consommation", id: "RRSFS" },
      ];

      const IMAGE_BASE_URLS = [
        "https://fred.stlouisfed.org/graph/fredgraph.png",
        "https://r.jina.ai/http://fred.stlouisfed.org/graph/fredgraph.png",
      ];

      const CSV_BASE_URLS = [
        "https://fred.stlouisfed.org/graph/fredgraph.csv",
        "https://r.jina.ai/http://fred.stlouisfed.org/graph/fredgraph.csv",
      ];

      function isoDate(d) {
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
      }

      function tenYearWindow() {
        const end = new Date();
        const start = new Date(end);
        start.setFullYear(end.getFullYear() - 10);
        return { start: isoDate(start), end: isoDate(end) };
      }

      function fredImageUrls(seriesId, start, end) {
        const params = new URLSearchParams({
          id: seriesId,
          cosd: start,
          coed: end,
        });

        return IMAGE_BASE_URLS.map((baseUrl) => `${baseUrl}?${params.toString()}`);
      }

      function fredGraphUrl(seriesId, start, end) {
        const params = new URLSearchParams({
          g: "",
          id: seriesId,
          cosd: start,
          coed: end,
        });

        return `https://fred.stlouisfed.org/series/${seriesId}?${params.toString()}`;
      }

      async function fetchLatestValue(seriesId) {
        const csvUrls = CSV_BASE_URLS.map((baseUrl) => `${baseUrl}?id=${encodeURIComponent(seriesId)}`);

        for (const url of csvUrls) {
          try {
            const response = await fetch(url);

            if (!response.ok) {
              continue;
            }

            const csv = await response.text();
            const rows = csv.trim().split("\n").slice(1).filter(Boolean);

            for (let i = rows.length - 1; i >= 0; i -= 1) {
              const [date, rawValue] = rows[i].split(",");
              if (rawValue && rawValue !== ".") {
                return { date, value: Number(rawValue) };
              }
            }
          } catch (error) {
            // Essai d'une URL suivante.
          }
        }

        throw new Error("Aucune valeur disponible");
      }

      function assignImageWithFallback(img, urls) {
        let index = 0;

        const tryNext = () => {
          if (index >= urls.length) {
            img.dispatchEvent(new Event("allSourcesFailed"));
            return;
          }

          img.src = urls[index];
          index += 1;
        };

        img.onerror = tryNext;
        tryNext();
      }

      function setupLightbox() {
        const lightbox = document.querySelector("#lightbox");
        const lightboxImage = document.querySelector("#lightboxImage");

        const close = () => {
          lightbox.classList.remove("open");
          lightbox.setAttribute("aria-hidden", "true");
          lightboxImage.removeAttribute("src");
        };

        lightbox.addEventListener("click", close);
        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape" && lightbox.classList.contains("open")) {
            close();
          }
        });

        return {
          open: (src, alt) => {
            lightboxImage.src = src;
            lightboxImage.alt = alt;
            lightbox.classList.add("open");
            lightbox.setAttribute("aria-hidden", "false");
          },
        };
      }

      async function buildCards() {
        const { start, end } = tenYearWindow();
        const grid = document.querySelector("#grid");
        const lightbox = setupLightbox();

        const cards = SERIES.map(async (series) => {
          const card = document.createElement("article");
          card.className = "card";

          const title = document.createElement("h2");
          title.textContent = series.title;

          const meta = document.createElement("p");
          meta.className = "meta";
          meta.innerHTML = `Série FRED: <strong>${series.id}</strong> · Période: ${start} → ${end}`;

          const currentValue = document.createElement("p");
          currentValue.className = "current-value";
          currentValue.textContent = "Valeur actuelle : chargement...";

          const img = document.createElement("img");
          img.className = "chart-img";
          img.alt = `Capture FRED pour ${series.title}`;
          img.loading = "lazy";
          const chartUrls = fredImageUrls(series.id, start, end);

          const link = document.createElement("a");
          link.href = fredGraphUrl(series.id, start, end);
          link.target = "_blank";
          link.rel = "noreferrer noopener";
          link.textContent = "Ouvrir la série sur FRED";

          img.addEventListener("allSourcesFailed", () => {
            const error = document.createElement("p");
            error.className = "error";
            error.textContent = "Impossible de charger cette image FRED (toutes les sources ont échoué).";
            if (!card.querySelector(".error")) {
              card.appendChild(error);
            }
          });

          assignImageWithFallback(img, chartUrls);
          img.addEventListener("click", () => {
            if (img.currentSrc || img.src) {
              lightbox.open(img.currentSrc || img.src, img.alt);
            }
          });

          try {
            const latest = await fetchLatestValue(series.id);
            const valueText = Number.isFinite(latest.value)
              ? latest.value.toLocaleString("fr-FR", { maximumFractionDigits: 2 })
              : latest.value;
            currentValue.textContent = `Valeur actuelle : ${valueText} (au ${latest.date})`;
          } catch (error) {
            currentValue.textContent = "Valeur actuelle : indisponible";
          }

          card.append(title, meta, currentValue, img, link);
          grid.appendChild(card);
        });

        await Promise.all(cards);

        document.querySelector("#updated").textContent = `Fenêtre 10 ans générée le ${new Date().toLocaleString("fr-FR")}`;
      }

      buildCards();
    </script>
  </body>
</html>
