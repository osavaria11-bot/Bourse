<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>10 graphiques macro US - FRED</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1220;
        --card: #111b2e;
        --text: #ecf3ff;
        --sub: #9fb4d9;
        --accent: #62a2ff;
        --accent2: #87e2bc;
        --accent3: #ffb66e;
        --border: #223454;
      }

      * {
        box-sizing: border-box;
        font-family: Inter, Segoe UI, Roboto, sans-serif;
      }

      body {
        margin: 0;
        background: linear-gradient(165deg, #09101d 0%, #0e1b2f 100%);
        color: var(--text);
      }

      .container {
        width: min(1450px, 96vw);
        margin: 1rem auto 1.5rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.4rem, 1rem + 1.8vw, 2.4rem);
      }

      .subtitle,
      .updated {
        margin-top: 0.6rem;
        color: var(--sub);
      }

      .updated {
        color: #87e2bc;
      }

      .panel {
        background: rgba(17, 27, 46, 0.95);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 0.85rem;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
        margin-top: 1rem;
      }

      .panel h2 {
        margin: 0 0 0.6rem;
        font-size: 1.05rem;
      }

      .chart-meta {
        color: var(--sub);
        font-size: 0.82rem;
        margin: 0.2rem 0 0.5rem;
      }

      svg {
        width: 100%;
        height: 280px;
        background: rgba(8, 15, 26, 0.7);
        border: 1px solid rgba(120, 145, 190, 0.28);
        border-radius: 10px;
      }

      .chart-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 0.9rem;
      }

      .chart-card {
        background: rgba(10, 18, 31, 0.8);
        border: 1px solid rgba(120, 145, 190, 0.2);
        border-radius: 12px;
        padding: 0.55rem;
      }

      .chart-card h3 {
        margin: 0;
        font-size: 0.95rem;
      }

      .chart-card p {
        margin: 0.25rem 0 0.45rem;
        color: var(--sub);
        font-size: 0.78rem;
      }

      .mini-chart {
        height: 180px;
      }

      .axis,
      .grid-line {
        stroke: rgba(120, 145, 190, 0.45);
        stroke-width: 1;
      }

      .grid-line {
        stroke-dasharray: 4 4;
        opacity: 0.5;
      }

      .line {
        fill: none;
        stroke-width: 2;
      }

      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 0.8rem;
        font-size: 0.82rem;
        color: var(--sub);
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 0.35rem;
      }

      .error {
        color: #ff9090;
        margin-top: 0.5rem;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>États-Unis — 10 graphiques mensuels (5 ans)</h1>
      <p class="subtitle">
        Données FRED converties sur une base mensuelle sur les 5 dernières années, sans tableau.
      </p>
      <p id="updated" class="updated">Chargement des séries...</p>

      <section class="panel">
        <h2>10 graphiques économiques (SVG)</h2>
        <p class="chart-meta">
          Chaque indicateur est affiché sur son propre graphique pour éviter les erreurs d'échelle.
        </p>
        <div id="chart-grid" class="chart-grid"></div>
      </section>
    </main>

    <script>
      const SERIES = [
        { key: "gdpReal", title: "PIB réel (YoY)", id: "GDPC1", unit: "%", transform: toYearOverYear },
        { key: "cpi", title: "Inflation CPI (YoY)", id: "CPIAUCSL", unit: "%", transform: toYearOverYear },
        { key: "coreInflation", title: "Core inflation (YoY)", id: "CPILFESL", unit: "%", transform: toYearOverYear },
        { key: "unemployment", title: "Taux de chômage", id: "UNRATE", unit: "%", transform: (rows) => rows },
        { key: "jobCreation", title: "Création d'emplois (m/m)", id: "PAYEMS", unit: "k", transform: toFirstDifference },
        { key: "wageGrowth", title: "Croissance salaires (YoY)", id: "CES0500000003", unit: "%", transform: toYearOverYear },
        { key: "policyRate", title: "Fed funds", id: "DFF", unit: "%", transform: (rows) => rows },
        { key: "tenYearYield", title: "Taux 10 ans", id: "GS10", unit: "%", transform: (rows) => rows },
        { key: "spread", title: "Spread 10-2 ans", id: "T10Y2Y", unit: "%", transform: (rows) => rows },
        { key: "retailSales", title: "Ventes au détail (YoY)", id: "RRSFS", unit: "%", transform: toYearOverYear },
      ];

      const FETCH_TIMEOUT_MS = 12000;

      function withTimeout(url, timeoutMs = FETCH_TIMEOUT_MS) {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), timeoutMs);
        return {
          signal: controller.signal,
          clear: () => clearTimeout(timeout),
          url,
        };
      }

      async function fetchTextWithFallbacks(urls) {
        const failures = [];

        for (const url of urls) {
          const req = withTimeout(url);
          try {
            const response = await fetch(req.url, {
              signal: req.signal,
              cache: "no-store",
            });

            if (!response.ok) {
              throw new Error(`HTTP ${response.status}`);
            }

            return await response.text();
          } catch (error) {
            failures.push(`${url} (${error.message})`);
          } finally {
            req.clear();
          }
        }

        throw new Error(
          [
            "Impossible de charger les données.",
            "Vérifiez le réseau/CORS ou configurez un proxy autorisé par votre entreprise.",
            `Sources testées: ${failures.join(" | ")}`,
          ].join(" "),
        );
      }

      function buildFallbackUrls(fredCsvUrl) {
        const encoded = encodeURIComponent(fredCsvUrl);

        return [
          // Direct source (works when CORS/network policy allows it).
          fredCsvUrl,
          // Public CORS relays: availability changes over time, so we keep several options.
          `https://api.allorigins.win/raw?url=${encoded}`,
          `https://corsproxy.io/?${encoded}`,
          `https://proxy.cors.sh/${fredCsvUrl}`,
          `https://cors.isomorphic-git.org/${fredCsvUrl}`,
          `https://thingproxy.freeboard.io/fetch/${fredCsvUrl}`,
        ];
      }

      async function fetchSeries(seriesId) {
        const fredCsvUrl = `https://fred.stlouisfed.org/graph/fredgraph.csv?id=${seriesId}`;
        const fallbackUrls = buildFallbackUrls(fredCsvUrl);

        const csv = await fetchTextWithFallbacks(fallbackUrls);
        const [header, ...lines] = csv.trim().split("\n");

        if (!header) {
          return [];
        }

        return lines
          .map((line) => {
            const [date, value] = line.split(",");
            if (!value || value === ".") return null;
            const num = Number(value);
            if (Number.isNaN(num)) return null;
            return { date, value: num };
          })
          .filter(Boolean);
      }

      function toYearOverYear(rows) {
        const out = [];
        for (let i = 12; i < rows.length; i++) {
          const prev = rows[i - 12].value;
          if (prev === 0) continue;
          const yoy = ((rows[i].value / prev) - 1) * 100;
          out.push({ date: rows[i].date, value: yoy });
        }
        return out;
      }

      function toFirstDifference(rows) {
        const out = [];
        for (let i = 1; i < rows.length; i++) {
          out.push({ date: rows[i].date, value: rows[i].value - rows[i - 1].value });
        }
        return out;
      }

      function formatValue(value, unit) {
        if (value == null || Number.isNaN(value)) {
          return "—";
        }

        if (unit === "%") {
          return `${value.toFixed(2)} %`;
        }

        if (unit === "k") {
          return `${value.toLocaleString("fr-FR", {
            minimumFractionDigits: 0,
            maximumFractionDigits: 0,
          })} k`;
        }

        if (Math.abs(value) >= 1_000_000) {
          return `${(value / 1_000_000).toFixed(1)}M`;
        }

        if (Math.abs(value) >= 1_000) {
          return `${(value / 1_000).toFixed(1)}k`;
        }

        return value.toLocaleString("fr-FR", {
          minimumFractionDigits: 0,
          maximumFractionDigits: 2,
        });
      }

      function toMonthKey(dateStr) {
        return dateStr.slice(0, 7);
      }

      function monthListLastFiveYears() {
        const today = new Date();
        const end = new Date(today.getFullYear(), today.getMonth(), 1);
        const start = new Date(end.getFullYear(), end.getMonth() - 59, 1);
        const months = [];

        for (let d = new Date(start); d <= end; d.setMonth(d.getMonth() + 1)) {
          const month = String(d.getMonth() + 1).padStart(2, "0");
          months.push(`${d.getFullYear()}-${month}`);
        }

        return months;
      }

      function forwardFillByMonth(rows, months) {
        const byMonth = new Map();
        for (const row of rows) {
          byMonth.set(toMonthKey(row.date), row.value);
        }

        const out = new Map();
        let carry = null;

        for (const month of months) {
          if (byMonth.has(month)) {
            carry = byMonth.get(month);
          }
          out.set(month, carry);
        }

        return out;
      }

      function chunkSegments(values) {
        const segments = [];
        let current = [];

        for (let i = 0; i < values.length; i++) {
          const item = values[i];
          if (item.value == null) {
            if (current.length > 1) segments.push(current);
            current = [];
            continue;
          }
          current.push(item);
        }

        if (current.length > 1) {
          segments.push(current);
        }

        return segments;
      }

      function drawMiniChart(svg, months, values, color, unit) {
        svg.innerHTML = "";
        const width = 900;
        const height = 180;
        const padding = { top: 14, right: 18, bottom: 24, left: 46 };
        const innerW = width - padding.left - padding.right;
        const innerH = height - padding.top - padding.bottom;

        const valid = values.filter((v) => v != null);
        if (!valid.length) return;

        const min = Math.min(...valid);
        const max = Math.max(...valid);
        const span = Math.max(1, max - min);
        const pad = span * 0.12;
        const minY = min - pad;
        const maxY = max + pad;

        const x = (i) => padding.left + (i / Math.max(1, months.length - 1)) * innerW;
        const y = (v) => padding.top + ((maxY - v) / Math.max(1e-9, maxY - minY)) * innerH;

        for (let i = 0; i <= 4; i++) {
          const ratio = i / 4;
          const yPos = padding.top + ratio * innerH;
          const yVal = maxY - ratio * (maxY - minY);

          const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
          line.setAttribute("x1", String(padding.left));
          line.setAttribute("y1", String(yPos));
          line.setAttribute("x2", String(width - padding.right));
          line.setAttribute("y2", String(yPos));
          line.setAttribute("class", "grid-line");
          svg.appendChild(line);

          const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
          label.setAttribute("x", String(padding.left - 6));
          label.setAttribute("y", String(yPos + 4));
          label.setAttribute("text-anchor", "end");
          label.setAttribute("font-size", "10");
          label.setAttribute("fill", "#9fb4d9");
          label.textContent = formatValue(yVal, unit).replace(" %", "");
          svg.appendChild(label);
        }

        const pointsByMonth = months.map((month, index) => ({ index, value: values[index] }));
        const segments = chunkSegments(pointsByMonth);

        for (const segment of segments) {
          const points = segment.map((p) => `${x(p.index)},${y(p.value)}`).join(" ");
          const line = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
          line.setAttribute("points", points);
          line.setAttribute("class", "line");
          line.setAttribute("stroke", color);
          svg.appendChild(line);
        }

        const lastIndex = values.findLastIndex((v) => v != null);
        if (lastIndex >= 0) {
          const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          circle.setAttribute("cx", String(x(lastIndex)));
          circle.setAttribute("cy", String(y(values[lastIndex])));
          circle.setAttribute("r", "3");
          circle.setAttribute("fill", color);
          svg.appendChild(circle);
        }
      }

      function drawEconomicCharts(months, allSeries) {
        const container = document.querySelector("#chart-grid");
        container.innerHTML = "";

        const colors = ["#62a2ff", "#87e2bc", "#ffb66e", "#f886ff", "#93c5fd", "#fca5a5"];

        SERIES.forEach((metric, index) => {
          const values = months.map((m) => allSeries[metric.key].get(m));
          const card = document.createElement("article");
          card.className = "chart-card";

          const title = document.createElement("h3");
          title.textContent = metric.title;

          const detail = document.createElement("p");
          const lastValue = [...values].reverse().find((v) => v != null);
          detail.textContent = `Dernière valeur: ${formatValue(lastValue, metric.unit)} · Série: ${metric.id}`;

          const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
          svg.classList.add("mini-chart");
          svg.setAttribute("viewBox", "0 0 900 180");
          svg.setAttribute("preserveAspectRatio", "none");

          drawMiniChart(svg, months, values, colors[index % colors.length], metric.unit);

          card.appendChild(title);
          card.appendChild(detail);
          card.appendChild(svg);
          container.appendChild(card);
        });
      }

      async function buildDashboard() {
        const updatedEl = document.querySelector("#updated");
        const months = monthListLastFiveYears();
        const allSeries = {};

        try {
          for (const metric of SERIES) {
            const raw = await fetchSeries(metric.id);
            const transformed = metric.transform(raw);
            allSeries[metric.key] = forwardFillByMonth(transformed, months);
          }

          drawEconomicCharts(months, allSeries);
          updatedEl.textContent = `Dernière mise à jour: ${new Date().toLocaleString("fr-CA")}`;
        } catch (error) {
          updatedEl.textContent = "Erreur lors du chargement des séries.";
          const container = document.querySelector("#chart-grid");
          container.innerHTML = `<p class="error">${error.message}</p>`;
        }
      }

      buildDashboard();
    </script>
  </body>
</html>
