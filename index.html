<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard macro US - FRED</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1220;
        --card: #111b2e;
        --text: #ecf3ff;
        --sub: #9fb4d9;
        --accent: #62a2ff;
        --border: #223454;
      }

      * {
        box-sizing: border-box;
        font-family: Inter, Segoe UI, Roboto, sans-serif;
      }

      body {
        margin: 0;
        background: linear-gradient(165deg, #09101d 0%, #0e1b2f 100%);
        color: var(--text);
      }

      .container {
        width: min(1200px, 92vw);
        margin: 2rem auto 4rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.4rem, 1rem + 1.8vw, 2.4rem);
      }

      .subtitle {
        margin-top: 0.6rem;
        color: var(--sub);
      }

      .updated {
        margin-top: 0.6rem;
        color: #87e2bc;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 1rem;
        margin-top: 1.5rem;
      }

      .card {
        background: rgba(17, 27, 46, 0.95);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 1rem;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
      }

      .card h2 {
        margin: 0;
        font-size: 1.05rem;
      }

      .meta {
        color: var(--sub);
        font-size: 0.87rem;
        margin-top: 0.35rem;
      }

      .value {
        margin-top: 0.6rem;
        font-size: 1.2rem;
        color: #b9d7ff;
      }

      .error {
        color: #ff9090;
        margin-top: 0.5rem;
      }

      canvas {
        margin-top: 0.9rem;
        width: 100%;
        height: 180px;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>États-Unis — Indicateurs macro (FRED)</h1>
      <p class="subtitle">
        Mise à jour à chaque chargement avec les dernières données FRED disponibles.
      </p>
      <p id="updated" class="updated">Chargement des séries...</p>
      <section id="cards" class="grid"></section>
    </main>

    <script>
      const SERIES = [
        {
          key: "gdpReal",
          title: "PIB réel (croissance annuelle)",
          id: "GDPC1",
          unit: "%",
          transform: (rows) => toYearOverYear(rows),
        },
        {
          key: "cpi",
          title: "CPI / IPC (inflation annuelle)",
          id: "CPIAUCSL",
          unit: "%",
          transform: (rows) => toYearOverYear(rows),
        },
        {
          key: "coreInflation",
          title: "Core inflation (inflation annuelle)",
          id: "CPILFESL",
          unit: "%",
          transform: (rows) => toYearOverYear(rows),
        },
        {
          key: "unemployment",
          title: "Taux de chômage",
          id: "UNRATE",
          unit: "%",
          transform: (rows) => rows,
        },
        {
          key: "jobCreation",
          title: "Création d'emplois (variation mensuelle)",
          id: "PAYEMS",
          unit: "milliers",
          transform: (rows) => toFirstDifference(rows),
        },
        {
          key: "wageGrowth",
          title: "Croissance des salaires (annuelle)",
          id: "CES0500000003",
          unit: "%",
          transform: (rows) => toYearOverYear(rows),
        },
        {
          key: "policyRate",
          title: "Taux directeur (Fed funds effectif)",
          id: "DFF",
          unit: "%",
          transform: (rows) => rows,
        },
        {
          key: "tenYearYield",
          title: "10 ans gouvernemental",
          id: "GS10",
          unit: "%",
          transform: (rows) => rows,
        },
        {
          key: "spread",
          title: "Spread 10 ans - 2 ans",
          id: "T10Y2Y",
          unit: "%",
          transform: (rows) => rows,
        },
        {
          key: "retailSales",
          title: "Ventes au détail / consommation (annuelle)",
          id: "RRSFS",
          unit: "%",
          transform: (rows) => toYearOverYear(rows),
        },
      ];

      function formatDate(dateStr) {
        return new Date(dateStr + "T00:00:00").toLocaleDateString("fr-CA");
      }

      const FETCH_TIMEOUT_MS = 12000;

      function withTimeout(url, timeoutMs = FETCH_TIMEOUT_MS) {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), timeoutMs);
        return {
          signal: controller.signal,
          clear: () => clearTimeout(timeout),
          url,
        };
      }

      async function fetchTextWithFallbacks(urls) {
        const failures = [];

        for (const url of urls) {
          const req = withTimeout(url);
          try {
            const response = await fetch(req.url, {
              signal: req.signal,
              cache: "no-store",
            });

            if (!response.ok) {
              throw new Error(`HTTP ${response.status}`);
            }

            return await response.text();
          } catch (error) {
            failures.push(`${url} (${error.message})`);
          } finally {
            req.clear();
          }
        }

        throw new Error(`Impossible de charger les données (${failures.join(" | ")})`);
      }

      async function fetchSeries(seriesId) {
        const fredCsvUrl = `https://fred.stlouisfed.org/graph/fredgraph.csv?id=${seriesId}`;
        const fallbackUrls = [
          fredCsvUrl,
          `https://api.allorigins.win/raw?url=${encodeURIComponent(fredCsvUrl)}`,
          `https://cors.isomorphic-git.org/${fredCsvUrl}`,
        ];

        const csv = await fetchTextWithFallbacks(fallbackUrls);
        const [header, ...lines] = csv.trim().split("\n");
        const [dateCol, valueCol] = header.split(",");

        return lines
          .map((line) => {
            const [date, value] = line.split(",");
            if (!value || value === ".") return null;
            const num = Number(value);
            if (Number.isNaN(num)) return null;
            return { date, value: num };
          })
          .filter(Boolean);
      }

      function toYearOverYear(rows) {
        const out = [];
        for (let i = 12; i < rows.length; i++) {
          const prev = rows[i - 12].value;
          if (prev === 0) continue;
          const yoy = ((rows[i].value / prev) - 1) * 100;
          out.push({ date: rows[i].date, value: yoy });
        }
        return out;
      }

      function toFirstDifference(rows) {
        const out = [];
        for (let i = 1; i < rows.length; i++) {
          out.push({ date: rows[i].date, value: rows[i].value - rows[i - 1].value });
        }
        return out;
      }

      function latestTenYears(rows) {
        const cutoff = new Date();
        cutoff.setFullYear(cutoff.getFullYear() - 10);
        return rows.filter((r) => new Date(r.date + "T00:00:00") >= cutoff);
      }

      function makeCard(metric, rows) {
        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <h2>${metric.title}</h2>
          <p class="meta">Série FRED: ${metric.id}</p>
          <p class="value" id="value-${metric.key}">--</p>
          <canvas id="chart-${metric.key}"></canvas>
        `;
        document.querySelector("#cards").appendChild(card);

        const current = rows[rows.length - 1];
        card.querySelector(`#value-${metric.key}`).textContent =
          `Dernière donnée (${formatDate(current.date)}): ${current.value.toFixed(2)} ${metric.unit}`;

        new Chart(card.querySelector(`#chart-${metric.key}`), {
          type: "line",
          data: {
            labels: rows.map((r) => r.date),
            datasets: [
              {
                label: metric.title,
                data: rows.map((r) => r.value),
                borderColor: "#62a2ff",
                borderWidth: 2,
                pointRadius: 0,
                tension: 0.2,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: (ctx) => `${ctx.parsed.y.toFixed(2)} ${metric.unit}`,
                },
              },
            },
            scales: {
              x: {
                ticks: {
                  maxTicksLimit: 6,
                  color: "#9fb4d9",
                },
                grid: { color: "rgba(120,145,190,0.12)" },
              },
              y: {
                ticks: {
                  color: "#9fb4d9",
                  callback: (v) => `${Number(v).toFixed(1)} ${metric.unit}`,
                },
                grid: { color: "rgba(120,145,190,0.15)" },
              },
            },
          },
        });
      }

      async function buildDashboard() {
        const updatedEl = document.querySelector("#updated");

        for (const metric of SERIES) {
          try {
            const raw = await fetchSeries(metric.id);
            const transformed = metric.transform(raw);
            const tenYears = latestTenYears(transformed);

            if (!tenYears.length) {
              throw new Error("pas de données sur 10 ans");
            }

            makeCard(metric, tenYears);
          } catch (error) {
            const card = document.createElement("article");
            card.className = "card";
            card.innerHTML = `<h2>${metric.title}</h2><p class="meta">Série FRED: ${metric.id}</p><p class="error">Erreur: ${error.message}</p>`;
            document.querySelector("#cards").appendChild(card);
          }
        }

        updatedEl.textContent = `Dernière mise à jour de la page: ${new Date().toLocaleString("fr-CA")}`;
      }

      buildDashboard();
    </script>
  </body>
</html>
