<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tableau mensuel macro US - FRED</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1220;
        --card: #111b2e;
        --text: #ecf3ff;
        --sub: #9fb4d9;
        --accent: #62a2ff;
        --accent2: #87e2bc;
        --accent3: #ffb66e;
        --border: #223454;
      }

      * {
        box-sizing: border-box;
        font-family: Inter, Segoe UI, Roboto, sans-serif;
      }

      body {
        margin: 0;
        background: linear-gradient(165deg, #09101d 0%, #0e1b2f 100%);
        color: var(--text);
      }

      .container {
        width: min(1450px, 96vw);
        margin: 1rem auto 1.5rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.4rem, 1rem + 1.8vw, 2.4rem);
      }

      .subtitle,
      .updated {
        margin-top: 0.6rem;
        color: var(--sub);
      }

      .updated {
        color: #87e2bc;
      }

      .panel {
        background: rgba(17, 27, 46, 0.95);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 0.85rem;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
        margin-top: 1rem;
      }

      .panel h2 {
        margin: 0 0 0.6rem;
        font-size: 1.05rem;
      }

      .table-wrap {
        overflow: auto;
        max-height: 58vh;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 1000px;
      }

      th,
      td {
        border: 1px solid rgba(120, 145, 190, 0.22);
        padding: 0.45rem 0.55rem;
        text-align: right;
        font-size: 0.82rem;
        white-space: nowrap;
      }

      th {
        position: sticky;
        top: 0;
        background: #14233d;
        color: #cfe2ff;
        z-index: 1;
      }

      td:first-child,
      th:first-child {
        text-align: left;
        position: sticky;
        left: 0;
        z-index: 2;
        background: #14233d;
      }

      th:first-child {
        z-index: 3;
      }

      .chart-meta {
        color: var(--sub);
        font-size: 0.82rem;
        margin: 0.2rem 0 0.5rem;
      }

      svg {
        width: 100%;
        height: 280px;
        background: rgba(8, 15, 26, 0.7);
        border: 1px solid rgba(120, 145, 190, 0.28);
        border-radius: 10px;
      }

      .axis,
      .grid-line {
        stroke: rgba(120, 145, 190, 0.45);
        stroke-width: 1;
      }

      .grid-line {
        stroke-dasharray: 4 4;
        opacity: 0.5;
      }

      .line {
        fill: none;
        stroke-width: 2;
      }

      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 0.8rem;
        font-size: 0.82rem;
        color: var(--sub);
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 0.35rem;
      }

      .error {
        color: #ff9090;
        margin-top: 0.5rem;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>États-Unis — Tableau mensuel (5 ans)</h1>
      <p class="subtitle">
        Données FRED converties sur une base mensuelle sur les 5 dernières années.
      </p>
      <p id="updated" class="updated">Chargement des séries...</p>

      <section class="panel">
        <h2>Tableau mensuel sur 5 ans</h2>
        <div id="table-status"></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr id="table-head"></tr>
            </thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <h2>Graphique fait à la main (SVG)</h2>
        <p class="chart-meta">
          Trois séries en base 100 au début de la période pour comparer les tendances.
        </p>
        <svg id="manual-chart" viewBox="0 0 900 280" preserveAspectRatio="none"></svg>
        <div id="legend" class="legend"></div>
      </section>
    </main>

    <script>
      const SERIES = [
        { key: "gdpReal", title: "PIB réel (YoY)", id: "GDPC1", unit: "%", transform: toYearOverYear },
        { key: "cpi", title: "Inflation CPI (YoY)", id: "CPIAUCSL", unit: "%", transform: toYearOverYear },
        { key: "coreInflation", title: "Core inflation (YoY)", id: "CPILFESL", unit: "%", transform: toYearOverYear },
        { key: "unemployment", title: "Taux de chômage", id: "UNRATE", unit: "%", transform: (rows) => rows },
        { key: "jobCreation", title: "Création d'emplois (m/m)", id: "PAYEMS", unit: "k", transform: toFirstDifference },
        { key: "wageGrowth", title: "Croissance salaires (YoY)", id: "CES0500000003", unit: "%", transform: toYearOverYear },
        { key: "policyRate", title: "Fed funds", id: "DFF", unit: "%", transform: (rows) => rows },
        { key: "tenYearYield", title: "Taux 10 ans", id: "GS10", unit: "%", transform: (rows) => rows },
        { key: "spread", title: "Spread 10-2 ans", id: "T10Y2Y", unit: "%", transform: (rows) => rows },
        { key: "retailSales", title: "Ventes au détail (YoY)", id: "RRSFS", unit: "%", transform: toYearOverYear },
      ];

      const FETCH_TIMEOUT_MS = 12000;

      function withTimeout(url, timeoutMs = FETCH_TIMEOUT_MS) {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), timeoutMs);
        return {
          signal: controller.signal,
          clear: () => clearTimeout(timeout),
          url,
        };
      }

      async function fetchTextWithFallbacks(urls) {
        const failures = [];

        for (const url of urls) {
          const req = withTimeout(url);
          try {
            const response = await fetch(req.url, {
              signal: req.signal,
              cache: "no-store",
            });

            if (!response.ok) {
              throw new Error(`HTTP ${response.status}`);
            }

            return await response.text();
          } catch (error) {
            failures.push(`${url} (${error.message})`);
          } finally {
            req.clear();
          }
        }

        throw new Error(`Impossible de charger les données (${failures.join(" | ")})`);
      }

      async function fetchSeries(seriesId) {
        const fredCsvUrl = `https://fred.stlouisfed.org/graph/fredgraph.csv?id=${seriesId}`;
        const fallbackUrls = [
          fredCsvUrl,
          `https://api.allorigins.win/raw?url=${encodeURIComponent(fredCsvUrl)}`,
          `https://cors.isomorphic-git.org/${fredCsvUrl}`,
        ];

        const csv = await fetchTextWithFallbacks(fallbackUrls);
        const [header, ...lines] = csv.trim().split("\n");

        if (!header) {
          return [];
        }

        return lines
          .map((line) => {
            const [date, value] = line.split(",");
            if (!value || value === ".") return null;
            const num = Number(value);
            if (Number.isNaN(num)) return null;
            return { date, value: num };
          })
          .filter(Boolean);
      }

      function toYearOverYear(rows) {
        const out = [];
        for (let i = 12; i < rows.length; i++) {
          const prev = rows[i - 12].value;
          if (prev === 0) continue;
          const yoy = ((rows[i].value / prev) - 1) * 100;
          out.push({ date: rows[i].date, value: yoy });
        }
        return out;
      }

      function toFirstDifference(rows) {
        const out = [];
        for (let i = 1; i < rows.length; i++) {
          out.push({ date: rows[i].date, value: rows[i].value - rows[i - 1].value });
        }
        return out;
      }

      function formatMonth(dateStr) {
        const date = new Date(`${dateStr}T00:00:00`);
        return date.toLocaleDateString("fr-FR", { year: "numeric", month: "short" });
      }

      function toMonthKey(dateStr) {
        return dateStr.slice(0, 7);
      }

      function monthListLastFiveYears() {
        const today = new Date();
        const end = new Date(today.getFullYear(), today.getMonth(), 1);
        const start = new Date(end.getFullYear(), end.getMonth() - 59, 1);
        const months = [];

        for (let d = new Date(start); d <= end; d.setMonth(d.getMonth() + 1)) {
          const month = String(d.getMonth() + 1).padStart(2, "0");
          months.push(`${d.getFullYear()}-${month}`);
        }

        return months;
      }

      function forwardFillByMonth(rows, months) {
        const byMonth = new Map();
        for (const row of rows) {
          byMonth.set(toMonthKey(row.date), row.value);
        }

        const out = new Map();
        let carry = null;

        for (const month of months) {
          if (byMonth.has(month)) {
            carry = byMonth.get(month);
          }
          out.set(month, carry);
        }

        return out;
      }

      function buildMonthlyTable(months, allSeries) {
        const head = document.querySelector("#table-head");
        const body = document.querySelector("#table-body");
        const status = document.querySelector("#table-status");

        head.innerHTML = "";
        body.innerHTML = "";

        const monthHead = document.createElement("th");
        monthHead.textContent = "Mois";
        head.appendChild(monthHead);

        for (const metric of SERIES) {
          const th = document.createElement("th");
          th.textContent = metric.title;
          head.appendChild(th);
        }

        for (const month of months) {
          const tr = document.createElement("tr");

          const monthCell = document.createElement("td");
          monthCell.textContent = formatMonth(`${month}-01`);
          tr.appendChild(monthCell);

          for (const metric of SERIES) {
            const value = allSeries[metric.key].get(month);
            const td = document.createElement("td");
            td.textContent = value == null ? "—" : value.toFixed(2);
            tr.appendChild(td);
          }

          body.appendChild(tr);
        }

        status.innerHTML = `<p class="updated">${months.length} mois affichés · ${SERIES.length} indicateurs.</p>`;
      }

      function drawManualChart(months, allSeries) {
        const svg = document.querySelector("#manual-chart");
        const legend = document.querySelector("#legend");
        svg.innerHTML = "";
        legend.innerHTML = "";

        const chosen = [
          { key: "cpi", label: "Inflation CPI", color: "var(--accent)" },
          { key: "unemployment", label: "Chômage", color: "var(--accent2)" },
          { key: "policyRate", label: "Fed funds", color: "var(--accent3)" },
        ];

        const padding = { top: 16, right: 20, bottom: 24, left: 40 };
        const width = 900;
        const height = 280;
        const innerW = width - padding.left - padding.right;
        const innerH = height - padding.top - padding.bottom;

        const normalized = chosen.map((serie) => {
          const values = months.map((m) => allSeries[serie.key].get(m));
          const base = values.find((v) => v != null) ?? 1;
          return {
            ...serie,
            values: values.map((v) => (v == null ? null : (v / base) * 100)),
          };
        });

        const yValues = normalized.flatMap((s) => s.values.filter((v) => v != null));
        const minY = Math.min(...yValues);
        const maxY = Math.max(...yValues);
        const spanY = Math.max(1, maxY - minY);

        const x = (i) => padding.left + (i / (months.length - 1)) * innerW;
        const y = (v) => padding.top + ((maxY - v) / spanY) * innerH;

        for (let i = 0; i <= 4; i++) {
          const gy = padding.top + (i / 4) * innerH;
          const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
          line.setAttribute("x1", String(padding.left));
          line.setAttribute("y1", String(gy));
          line.setAttribute("x2", String(width - padding.right));
          line.setAttribute("y2", String(gy));
          line.setAttribute("class", "grid-line");
          svg.appendChild(line);
        }

        const axisX = document.createElementNS("http://www.w3.org/2000/svg", "line");
        axisX.setAttribute("x1", String(padding.left));
        axisX.setAttribute("y1", String(height - padding.bottom));
        axisX.setAttribute("x2", String(width - padding.right));
        axisX.setAttribute("y2", String(height - padding.bottom));
        axisX.setAttribute("class", "axis");
        svg.appendChild(axisX);

        const axisY = document.createElementNS("http://www.w3.org/2000/svg", "line");
        axisY.setAttribute("x1", String(padding.left));
        axisY.setAttribute("y1", String(padding.top));
        axisY.setAttribute("x2", String(padding.left));
        axisY.setAttribute("y2", String(height - padding.bottom));
        axisY.setAttribute("class", "axis");
        svg.appendChild(axisY);

        for (const serie of normalized) {
          const points = serie.values
            .map((v, i) => (v == null ? null : `${x(i)},${y(v)}`))
            .filter(Boolean)
            .join(" ");

          const polyline = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
          polyline.setAttribute("points", points);
          polyline.setAttribute("class", "line");
          polyline.setAttribute("stroke", serie.color);
          svg.appendChild(polyline);

          const legendItem = document.createElement("span");
          legendItem.innerHTML = `<span class="dot" style="background:${serie.color}"></span>${serie.label}`;
          legend.appendChild(legendItem);
        }
      }

      async function buildDashboard() {
        const updatedEl = document.querySelector("#updated");
        const months = monthListLastFiveYears();
        const allSeries = {};

        try {
          for (const metric of SERIES) {
            const raw = await fetchSeries(metric.id);
            const transformed = metric.transform(raw);
            allSeries[metric.key] = forwardFillByMonth(transformed, months);
          }

          buildMonthlyTable(months, allSeries);
          drawManualChart(months, allSeries);
          updatedEl.textContent = `Dernière mise à jour: ${new Date().toLocaleString("fr-CA")}`;
        } catch (error) {
          updatedEl.textContent = "Erreur lors du chargement des séries.";
          const status = document.querySelector("#table-status");
          status.innerHTML = `<p class="error">${error.message}</p>`;
        }
      }

      buildDashboard();
    </script>
  </body>
</html>
